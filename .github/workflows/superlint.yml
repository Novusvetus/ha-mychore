name: Lint

on: # yamllint disable-line rule:truthy
  push: null
  pull_request: null
  schedule:
    - cron: "0 10 * * 5"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fix-lint-issues:
    name: 🧹 Lint fix
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' &&
      github.ref_name != github.event.repository.default_branch

    outputs:
      changed: ${{ steps.changes.outputs.changed }}

    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.SUPER_LINTER_TOKEN }}

      - name: 🔄 Load super-linter configuration
        run: grep -v '^#' .ci/super-linter.env >> "$GITHUB_ENV"

      - name: 🧹 Super-linter fixes
        uses: super-linter/super-linter@61abc07d755095a68f4987d1c2c3d1d64408f1f9 # v8.5.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ENABLE_GITHUB_PULL_REQUEST_SUMMARY_COMMENT: false
          FIX_ANSIBLE: true
          FIX_BIOME_FORMAT: true
          FIX_BIOME_LINT: true
          FIX_CLANG_FORMAT: true
          FIX_CSHARP: true
          FIX_DOTNET_SLN_FORMAT_ANALYZERS: true
          FIX_DOTNET_SLN_FORMAT_STYLE: true
          FIX_DOTNET_SLN_FORMAT_WHITESPACE: true
          FIX_ENV: true
          FIX_GITHUB_ACTIONS_ZIZMOR: true
          FIX_GO: true
          FIX_GOOGLE_JAVA_FORMAT: true
          FIX_GO_MODULES: true
          FIX_GROOVY: true
          FIX_JUPYTER_NBQA_BLACK: true
          FIX_JUPYTER_NBQA_ISORT: true
          FIX_JUPYTER_NBQA_RUFF: true
          FIX_KOTLIN: true
          FIX_MARKDOWN: true
          FIX_MARKDOWN_PRETTIER: true
          FIX_NATURAL_LANGUAGE: true
          FIX_POWERSHELL: true
          FIX_PROTOBUF: true
          FIX_PYTHON_ISORT: true
          FIX_PYTHON_RUFF: true
          FIX_PYTHON_RUFF_FORMAT: true
          FIX_RUBY: true
          FIX_RUST_2015: true
          FIX_RUST_2018: true
          FIX_RUST_2021: true
          FIX_RUST_2024: true
          FIX_RUST_CLIPPY: true
          FIX_SCALAFMT: true
          FIX_SHELL_SHFMT: true
          FIX_SNAKEMAKE_SNAKEFMT: true
          FIX_SPELL_CODESPELL: true
          FIX_SQLFLUFF: true
          FIX_TERRAFORM_FMT: true
          FIX_YAML_PRETTIER: true

      - name: 🔍 Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected"
            git diff
          fi

      - name: Commit and push linting fixes
        if: steps.changes.outputs.changed == 'true'
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7
        with:
          branch: ${{ github.event.pull_request.head.ref || github.head_ref || github.ref }}
          commit_message: "chore: fix linting issues"
          commit_user_name: super-linter
          commit_user_email: super-linter@super-linter.dev

  lint:
    name: 🧹 Lint
    runs-on: ubuntu-latest
    needs: [fix-lint-issues]
    if: >
      always() &&
      (
        needs.fix-lint-issues.result == 'skipped'
      )

    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: 🔄 Load super-linter configuration
        run: grep -v '^#' .ci/super-linter.env >> "$GITHUB_ENV"

      - name: 🧹 Super-linter
        uses: super-linter/super-linter@61abc07d755095a68f4987d1c2c3d1d64408f1f9 # v8.5.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ENABLE_GITHUB_PULL_REQUEST_SUMMARY_COMMENT: false
